name: Build CounselNote Windows installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packaging tool
        run: npm install --no-save @yao-pkg/pkg

      - name: Build CounselNote.exe
        run: npx @yao-pkg/pkg server.js --target node20-win-x64 --output dist/CounselNote.exe

      - name: Stage distributable folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/CounselNote | Out-Null
          Copy-Item dist/CounselNote.exe build/CounselNote/
          Copy-Item index.html, styles.css, app.js, README.md, LICENCE.txt, PRICING.md build/CounselNote/
          Copy-Item -Recurse -Force assets build/CounselNote/assets -ErrorAction SilentlyContinue
          @"
          @echo off
          title CounselNote
          start "" "%~dp0CounselNote.exe"
          timeout /t 2 >nul
          start "" "http://127.0.0.1:8790"
          "@ | Out-File -Encoding ascii build/CounselNote/Launch-CounselNote.bat

      - name: Zip distributable
        shell: pwsh
        run: Compress-Archive -Path build/CounselNote/* -DestinationPath CounselNote-Windows.zip

      - name: Checksum
        shell: pwsh
        run: |
          $hash = Get-FileHash CounselNote-Windows.zip -Algorithm SHA256
          "$($hash.Hash)  CounselNote-Windows.zip" | Out-File -Encoding ascii CounselNote-Windows.zip.sha256

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            CounselNote-Windows.zip
            CounselNote-Windows.zip.sha256

      - name: Upload build artefact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CounselNote-Windows
          path: |
            CounselNote-Windows.zip
            CounselNote-Windows.zip.sha256
