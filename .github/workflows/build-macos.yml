name: Build CounselNote macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packaging tool
        run: npm install --no-save @yao-pkg/pkg

      - name: Build universal CounselNote binary
        run: |
          npx @yao-pkg/pkg server.js --target node20-macos-x64 --output dist/CounselNote-x64
          npx @yao-pkg/pkg server.js --target node20-macos-arm64 --output dist/CounselNote-arm64
          lipo -create -output dist/CounselNote dist/CounselNote-x64 dist/CounselNote-arm64
          chmod +x dist/CounselNote

      - name: Assemble CounselNote.app bundle
        run: |
          APP=build/CounselNote.app
          mkdir -p "$APP/Contents/MacOS"
          cp dist/CounselNote "$APP/Contents/MacOS/CounselNote-bin"
          cp index.html styles.css app.js README.md LICENCE.txt PRICING.md "$APP/Contents/MacOS/"
          cat > "$APP/Contents/MacOS/launch.sh" << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          "$DIR/CounselNote-bin" &
          sleep 1
          open "http://127.0.0.1:8790"
          wait
          EOF
          chmod +x "$APP/Contents/MacOS/launch.sh" "$APP/Contents/MacOS/CounselNote-bin"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>CounselNote</string>
            <key>CFBundleDisplayName</key><string>CounselNote</string>
            <key>CFBundleIdentifier</key><string>uk.counselnote.app</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>launch.sh</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      - name: Zip the .app bundle
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent CounselNote.app ../CounselNote-macOS.zip

      - name: Checksum
        run: shasum -a 256 CounselNote-macOS.zip > CounselNote-macOS.zip.sha256

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            CounselNote-macOS.zip
            CounselNote-macOS.zip.sha256

      - name: Upload build artefact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CounselNote-macOS
          path: |
            CounselNote-macOS.zip
            CounselNote-macOS.zip.sha256
